<!DOCTYPE html>
<html>
<head>
    <title>Form Registrasi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f2ff;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        h2 {
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: green;
            color: white;
            border: none;
        }
        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Registrasi</h2>
    <form>
        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan Nama">

        <label>Email</label>
        <input type="email" placeholder="Masukkan Email">

        <label>Username</label>
        <input type="text" placeholder="Buat Username">

        <label>Password</label>
        <input type="password" placeholder="Buat Password">

        <label>Alamat</label>
        <textarea placeholder="Masukkan Alamat"></textarea>

        <button type="submit">Daftar</button>
    </form>

    <div class="link">
        Sudah punya akun? <a href="login.html">Login di sini</a>
    </div>
</div>

</body>
</html>
